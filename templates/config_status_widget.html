<!-- API 키 상태 위젯 -->
<div class="card mb-4">
    <div class="card-header bg-info text-white">
        <h5 class="mb-0">
            <i class="fas fa-heartbeat"></i> API 키 상태
            <button class="btn btn-sm btn-light float-end" onclick="refreshApiStatus()">
                <i class="fas fa-sync"></i> 새로고침
            </button>
        </h5>
    </div>
    <div class="card-body">
        <div id="apiStatusContainer">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">로딩 중...</span>
                </div>
                <p class="mt-2">API 상태 확인 중...</p>
            </div>
        </div>
    </div>
</div>

<script>
// 페이지 로드 시 API 상태 확인
document.addEventListener('DOMContentLoaded', function() {
    refreshApiStatus();
});

function refreshApiStatus() {
    const container = document.getElementById('apiStatusContainer');
    
    // 로딩 표시
    container.innerHTML = `
        <div class="text-center">
            <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
            <span class="ms-2">확인 중...</span>
        </div>
    `;
    
    // API 상태 조회
    fetch('/api/config/api-status')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                displayApiStatus(data.status);
            } else {
                container.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i>
                        API 상태 확인 실패: ${data.error}
                    </div>
                `;
            }
        })
        .catch(error => {
            container.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-times-circle"></i>
                    네트워크 오류: ${error.message}
                </div>
            `;
        });
}

function displayApiStatus(status) {
    const container = document.getElementById('apiStatusContainer');
    
    let html = '<div class="list-group">';
    
    // Gemini 상태
    const gemini = status.gemini;
    const geminiIcon = gemini.status === 'valid' ? 'check-circle' : 
                       gemini.status === 'invalid' ? 'times-circle' : 'question-circle';
    const geminiClass = gemini.status === 'valid' ? 'success' : 
                        gemini.status === 'invalid' ? 'danger' : 'secondary';
    
    html += `
        <div class="list-group-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1">
                        <i class="fas fa-${geminiIcon} text-${geminiClass}"></i>
                        Gemini API
                    </h6>
                    <small class="text-muted">${gemini.message}</small>
                </div>
                <span class="badge bg-${geminiClass}">${gemini.status}</span>
            </div>
        </div>
    `;
    
    // OpenAI 상태
    const openai = status.openai;
    const openaiIcon = openai.status === 'valid' ? 'check-circle' : 
                       openai.status === 'invalid' ? 'times-circle' : 'question-circle';
    const openaiClass = openai.status === 'valid' ? 'success' : 
                        openai.status === 'invalid' ? 'danger' : 'secondary';
    
    html += `
        <div class="list-group-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1">
                        <i class="fas fa-${openaiIcon} text-${openaiClass}"></i>
                        OpenAI API
                    </h6>
                    <small class="text-muted">${openai.message}</small>
                </div>
                <span class="badge bg-${openaiClass}">${openai.status}</span>
            </div>
        </div>
    `;
    
    html += '</div>';
    
    // 경고 메시지
    if (gemini.status !== 'valid' && openai.status !== 'valid') {
        html += `
            <div class="alert alert-warning mt-3 mb-0">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>주의:</strong> 유효한 API 키가 없습니다. 
                AI 번역이 작동하지 않으며, 규칙 기반 번역만 사용됩니다.
            </div>
        `;
    }
    
    container.innerHTML = html;
}

// 설정 저장 전 검증
function validateApiKeysBeforeSave(formData) {
    return fetch('/api/config/validate-api-keys', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success && data.results) {
            let hasInvalid = false;
            let messages = [];
            
            for (let [api, result] of Object.entries(data.results)) {
                if (!result.valid) {
                    hasInvalid = true;
                    messages.push(`${api}: ${result.message}`);
                }
            }
            
            if (hasInvalid) {
                const confirmed = confirm(
                    '다음 API 키가 유효하지 않습니다:\n\n' + 
                    messages.join('\n') + 
                    '\n\n그래도 저장하시겠습니까?'
                );
                return confirmed;
            }
        }
        return true;
    })
    .catch(error => {
        console.error('API 검증 실패:', error);
        return true; // 검증 실패 시에도 저장 허용
    });
}
</script>

<style>
.list-group-item {
    border-left: 4px solid transparent;
}
.list-group-item:hover {
    background-color: #f8f9fa;
}
</style>
